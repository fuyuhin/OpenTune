name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - 'claude/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history + tags so the changelog step can diff against the last release

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install SDK components
      run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build ARM64 Release APK
      env:
        STORE_PASSWORD: opentune_release
        KEY_ALIAS: opentune
        KEY_PASSWORD: opentune_release
      run: ./gradlew assembleArm64Release

    - name: Get version name
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
        SHORT_SHA=${GITHUB_SHA::7}
        echo "name=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        PREV_TAG=$(git tag --sort=-creatordate | head -n 1)
        if [ -z "$PREV_TAG" ]; then
          RANGE=""
          RANGE_LABEL="历史全部提交"
        else
          RANGE="${PREV_TAG}..HEAD"
          RANGE_LABEL="自 ${PREV_TAG} 起"
        fi

        # Exclude merge commits; trailers/co-authored lines are dropped because %s is subject-only
        COMMITS=$(git log ${RANGE} --pretty=format:"- %s (%h)" --no-merges)

        {
          echo "body<<__CHANGELOG_EOF__"
          echo "**OpenTune ARM64 Release · ${{ steps.version.outputs.name }}**"
          echo ""
          echo "### 更新内容（${RANGE_LABEL}）"
          echo ""
          if [ -z "$COMMITS" ]; then
            echo "_无新提交_"
          else
            echo "$COMMITS"
          fi
          echo ""
          echo "---"
          echo "_完整对比_: ${PREV_TAG:-初始版本}...${{ steps.version.outputs.name }}"
          echo "__CHANGELOG_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenTune-arm64
        path: app/build/outputs/apk/arm64/release/*.apk

    - name: Publish Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.name }}
        name: OpenTune ${{ steps.version.outputs.name }}
        body: ${{ steps.changelog.outputs.body }}
        files: app/build/outputs/apk/arm64/release/*.apk
        draft: false
        prerelease: false
